<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Spam Wars</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: linear-gradient(180deg, #1e1068 0%, #100840 44%, #04011a 50%, #100840 56%, #1e1068 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    user-select: none;
    overflow-x: hidden;
    overflow-y: auto;
    animation: bodyThud 0.35s ease-out 0.05s both;
    touch-action: manipulation;
  }
  canvas { touch-action: none; }
  #content {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  @keyframes bodyThud {
    0%   { transform: translateY(0); }
    30%  { transform: translateY(-4px); }
    60%  { transform: translateY(2px); }
    80%  { transform: translateY(-1px); }
    100% { transform: translateY(0); }
  }

  /* ── Title ── */
  #title {
    font-family: 'Press Start 2P', monospace;
    font-size: 3rem;
    letter-spacing: 3px;
    line-height: 1;
    animation: titleFill 1.1s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  #title .p1,
  #title .p2 {
    display: inline-block;
    background: linear-gradient(180deg,
      #ffe600  0%,
      #ff9900 22%,
      #ff3300 58%,
      #aa0a00 100%
    );
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter:
      drop-shadow(6px 6px 0 #3363e8)
      drop-shadow(12px 12px 0 rgba(0,0,0,0.5));
  }
  #title .p1 { animation: titleFill 1.1s cubic-bezier(0.22, 1, 0.36, 1) both; }
  #title .p2 { animation: titleFill 1.1s cubic-bezier(0.22, 1, 0.36, 1) both; }

  @keyframes titleFill {
    0%   { transform: scale(7);    opacity: 0;   filter: blur(16px); }
    18%  { opacity: 1;             filter: blur(6px); }
    55%  { transform: scale(0.95); filter: blur(0); }
    72%  { transform: scale(1.03); }
    88%  { transform: scale(0.99); }
    100% { transform: scale(1); }
  }

  /* ── Tagline ── */
  #tagline {
    font-family: 'Press Start 2P', monospace;
    font-size: 0.45rem;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
    margin-top: 2px;
    animation: taglineFade 0.5s ease-out 0.65s both;
  }
  @keyframes taglineFade {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0);   }
  }

  /* ── Impact flash ── */
  #bg-canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
  }
  #slam-flash {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 60% 30% at 50% 18%, white, transparent 70%);
    pointer-events: none;
    z-index: 999;
    animation: slamFlash 0.55s ease-out 0.05s both;
  }
  @keyframes slamFlash {
    0%   { opacity: 0; }
    18%  { opacity: 0.18; }
    100% { opacity: 0; }
  }

  /* ── CRT arcade bezel ── */
  #crt-bezel {
    position: relative;
    padding: 30px 36px 40px 36px;
    border-radius: 60px;
    /* Chunky dark-plastic body */
    background: linear-gradient(150deg,
      #46435e 0%,
      #2e2b46 15%,
      #1c1a2e 40%,
      #141220 60%,
      #1e1c32 80%,
      #302e4a 100%
    );
    /* 3-D bevel — wide bright top-left edge, deep dark bottom-right */
    box-shadow:
      inset  0   0   0  1px #5a567c,
      inset  6px  6px  0 #524f72,
      inset 14px 14px  0 #3a3858,
      inset -6px -6px  0 #06050f,
      inset -14px -14px 0 #0c0a1a,
      /* screen-recess rim — subtle inner dark ring */
      inset 0 0 0 28px rgba(0,0,0,0.35),
      /* outer base shadow for depth */
      0 10px 0 #07060f,
      0 14px 0 #050410,
      0 20px 60px rgba(0,0,0,0.98),
      0  4px 80px rgba(60,30,160,0.4);
    animation: canvasFadeIn 0.5s ease-out 0.3s both;
  }

  /* Corner screws */
  #crt-bezel::before,
  #crt-bezel::after {
    content: '';
    position: absolute;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 36%, #6a6890, #2a2840 55%, #111);
    box-shadow: inset 1px 1px 2px rgba(255,255,255,0.18), 0 1px 3px #000;
  }
  #crt-bezel::before { top: 18px; left: 22px; }
  #crt-bezel::after  { bottom: 22px; right: 26px; }

  #game-wrap {
    position: relative;
    border-radius: 24px;
    overflow: hidden;
    box-shadow:
      /* Deep inset recess — screen sits behind the bezel rim */
      inset 0  0 100px rgba(0,0,0,0.7),
      inset 0  0   3px rgba(255,255,255,0.06),
      0 0 0 4px #02020a,
      0 0 0 6px #1a1830;
  }
  canvas {
    display: block;
    border-radius: 24px;
  }
  #scanlines {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.09) 2px,
      rgba(0,0,0,0.09) 4px
    );
    pointer-events: none;
    border-radius: 24px;
  }
  /* Convex glass specular highlight */
  #crt-gloss {
    position: absolute;
    inset: 0;
    border-radius: 24px;
    background: radial-gradient(
      ellipse 60% 40% at 35% 25%,
      rgba(255,255,255,0.07) 0%,
      transparent 55%
    );
    pointer-events: none;
    z-index: 5;
  }
  @keyframes canvasFadeIn {
    from { opacity: 0; transform: scale(0.97); }
    to   { opacity: 1; transform: scale(1); }
  }

  /* Extra corner screws */
  .crt-screw {
    position: absolute;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 36%, #6a6890, #2a2840 55%, #111);
    box-shadow: inset 1px 1px 2px rgba(255,255,255,0.18), 0 1px 3px #000;
    z-index: 2;
  }
  .crt-screw::after {
    content: '';
    position: absolute;
    top: 50%; left: 15%;
    width: 70%; height: 2px;
    background: rgba(0,0,0,0.45);
    transform: translateY(-50%) rotate(45deg);
    border-radius: 1px;
  }

  /* Scrolling ticker */
  #ticker {
    width: 892px; /* canvas 820 + bezel padding 36*2 */
    overflow: hidden;
    font-family: 'Press Start 2P', monospace;
    font-size: 0.42rem;
    color: rgba(255,238,0,0.55);
    letter-spacing: 1px;
    white-space: nowrap;
    margin-top: 6px;
  }
  #ticker span {
    display: inline-block;
    animation: tickerScroll 22s linear infinite;
  }
  @keyframes tickerScroll {
    from { transform: translateX(0); }
    to   { transform: translateX(-100%); }
  }
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div id="slam-flash"></div>
<div id="content">
<div id="title"><span class="p1">SPAM</span> <span class="p2">WARS</span></div>
<div id="tagline">tap faster &nbsp;·&nbsp; win harder</div>
<div id="crt-bezel">
  <div class="crt-screw" style="top:18px;right:26px"></div>
  <div class="crt-screw" style="bottom:22px;left:22px"></div>
  <div id="game-wrap"><canvas id="c"></canvas><div id="scanlines"></div><div id="crt-gloss"></div></div>
</div>
<div id="ticker"><span>· SPAM WARS · TAP FASTER · WIN HARDER · BEST OF 3 · INSERT COIN · SPAM WARS · TAP FASTER · WIN HARDER · BEST OF 3 · INSERT COIN ·&nbsp;&nbsp;&nbsp;&nbsp;</span><span>· SPAM WARS · TAP FASTER · WIN HARDER · BEST OF 3 · INSERT COIN · SPAM WARS · TAP FASTER · WIN HARDER · BEST OF 3 · INSERT COIN ·&nbsp;&nbsp;&nbsp;&nbsp;</span></div>
</div>

<script type="module" src="/src/main-legacy.ts"></script>
</body>
</html>
